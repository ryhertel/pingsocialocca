  <body>
    <div id="root">
      <style>
        #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;background:#090d14;z-index:9999}
        #splash img{height:2.5rem;opacity:.8}
        #splash .dots{display:flex;gap:6px}
        #splash .dots span{width:6px;height:6px;border-radius:50%;background:hsl(160,100%,50%);opacity:.25;animation:blink 1.2s infinite}
        #splash .dots span:nth-child(2){animation-delay:.2s}
        #splash .dots span:nth-child(3){animation-delay:.4s}
        @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
      </style>
      <div id="splash">
        <img src="/ping-square.png" alt="Ping" />
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
